name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      elasticsearch:
        image: elasticsearch:9.4.0
        env:
          discovery.type: single-node
          xpack.security.enabled: false
        options: >-
          --health-cmd "curl -fsS http://localhost:9200/_cluster/health | grep -E '(green|yellow)'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --memory 500m
        ports:
          - 9200:9200

    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/heapoverflow_test
      ELASTICSEARCH_URL: http://localhost:9200

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Copy sample configs
        run: |
          cp config/database.yml.sample config/database.yml
          cp config/storage.yml.sample config/storage.yml

      - name: Prepare database
        run: bin/rails db:create db:schema:load

      - name: Reindex Elasticsearch
        run: bin/rails searchkick:reindex:all

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run Brakeman
        run: bundle exec brakeman -q -w2 -z

      - name: Run RSpec
        run: bundle exec rspec
